<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Three.js Spring Motion Lab</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d12; }
      canvas { display: block; }
      aside {
        position: fixed; left: 18px; top: 18px; padding: 14px 16px; color: #eef3ff;
        background: rgba(8, 10, 16, .8); border: 1px solid #4c576d; border-radius: 9px;
        font: 13px/1.5 system-ui, sans-serif;
      }
      strong { display: block; font-size: 15px; }
      .lerp { color: #ff6688; } .damp { color: #64d9ff; } .spring { color: #ffd166; }
    </style>
    <script type="importmap">
      { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js" } }
    </script>
  </head>
  <body>
    <aside>
      <strong>Motion response comparison</strong>
      <span class="lerp">Red: fixed per-frame lerp</span><br />
      <span class="damp">Blue: frame-rate-independent exponential damping</span><br />
      <span class="spring">Gold: underdamped spring with velocity state</span><br />
      Click to move the target.
    </aside>
    <script type="module" src="./main.js"></script>
  </body>
</html>
